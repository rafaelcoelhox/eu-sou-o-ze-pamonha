services:
  canjica: &api
    image: ${RINHA_IMAGE:-ghcr.io/rafaelcoelhox/eu-sou-o-ze-pamonha:kdtree-20260601}
    platform: linux/amd64
    cpuset: "0"
    command: ["/usr/local/bin/canjica"]
    environment:
      RINHA_SOCK: /run/sock/canjica.sock
      RINHA_INDEX_PATH: /app/data/index.ivf
      API_WARMUP_QUERIES: "4096"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    logging:
      driver: none
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
  pamonha:
    <<: *api
    cpuset: "1"
    command: ["/usr/local/bin/pamonha"]
    environment:
      RINHA_SOCK: /run/sock/pamonha.sock
      RINHA_INDEX_PATH: /app/data/index.ivf
      API_WARMUP_QUERIES: "4096"
  lb:
    image: ${RINHA_IMAGE:-ghcr.io/rafaelcoelhox/eu-sou-o-ze-pamonha:kdtree-20260601}
    platform: linux/amd64
    cpuset: "2,3"
    command: ["/usr/local/bin/carro-da-pamonha"]
    depends_on:
      - canjica
      - pamonha
    environment:
      RINHA_LB_PORT: "9999"
      RINHA_UPSTREAMS: /run/sock/canjica.sock,/run/sock/pamonha.sock
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    logging:
      driver: none
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"
networks:
  rinha:
    driver: bridge
volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,uid=0,gid=0,mode=0777"
